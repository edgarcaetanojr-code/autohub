<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f4f6f9;
    }

    .header {
      background: #1f2937;
      color: white;
      padding: 15px;
    }

    .logout {
      float: right;
      cursor: pointer;
      color: #f87171;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 8px;
    }

    a {
      display: block;
      color: #2563eb;
      margin-top: 5px;
    }
  </style>
</head>

<body>

<div class="header">
  <span id="welcome"></span>
  <span class="logout" onclick="logout()">Sair</span>
</div>

<div class="container" id="content"></div>

<script>
// 🔐 RECUPERA USUÁRIO
const user = JSON.parse(localStorage.getItem('user'));
const username = localStorage.getItem('username');

// 🚨 SE NÃO EXISTIR → VOLTA PRO LOGIN
if (!user || !username) {
  alert("Sessão expirada. Faça login novamente.");
  window.location.href = '/login';
}

// 👋 MOSTRA NOME
document.getElementById('welcome').innerText =
  "Bem-vindo, " + user.nome;

// 🚀 CARREGA DADOS
async function loadDashboard() {
  try {
    const res = await fetch(`/dashboard?username=${username}`);

    if (!res.ok) {
      throw new Error("Erro ao carregar dashboard");
    }

    const data = await res.json();

    let html = '';

    if (!data.departamentos || data.departamentos.length === 0) {
      html = "<p>Nenhum departamento disponível.</p>";
    } else {
      data.departamentos.forEach(dep => {
        html += `<div class="card">`;
        html += `<h3>${dep.nome}</h3>`;

        dep.links.forEach(link => {
          html += `<a href="${link.url}" target="_blank">${link.nome}</a>`;
        });

        html += `</div>`;
      });
    }

    document.getElementById('content').innerHTML = html;

  } catch (err) {
    document.getElementById('content').innerHTML =
      "<p>Erro ao carregar dados.</p>";
  }
}

// 🔓 LOGOUT
function logout() {
  localStorage.clear();
  window.location.href = '/login';
}

loadDashboard();
</script>

</body>
</html>
