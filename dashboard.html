<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f4f6f9;
    }

    .header {
      background: #1f2937;
      color: white;
      padding: 15px;
    }

    .logout {
      float: right;
      cursor: pointer;
      color: #f87171;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 8px;
    }

    a {
      display: block;
      color: #2563eb;
      margin-top: 5px;
    }
  </style>
</head>

<body>

<div class="header">
  <span id="welcome"></span>
  <span class="logout" onclick="logout()">Sair</span>
</div>

<div class="container" id="content"></div>

<script>
// 🔐 PEGAR USUÁRIO
const user = JSON.parse(localStorage.getItem('user'));
const username = localStorage.getItem('username');

// 🚨 BLOQUEIO
if (!user || !username) {
  window.location.href = '/login';
}

// 👋 MOSTRAR NOME
document.getElementById('welcome').innerText =
  "Bem-vindo, " + user.nome;

// 🚀 CARREGAR DADOS
async function loadDashboard() {
  const res = await fetch(`/dashboard?username=${username}`);
  const data = await res.json();

  let html = '';

  data.departamentos.forEach(dep => {
    html += `<div class="card">`;
    html += `<h3>${dep.nome}</h3>`;

    dep.links.forEach(link => {
      html += `<a href="${link.url}" target="_blank">${link.nome}</a>`;
    });

    html += `</div>`;
  });

  document.getElementById('content').innerHTML = html;
}

// 🔓 LOGOUT
function logout() {
  localStorage.clear();
  window.location.href = '/login';
}

loadDashboard();
</script>

</body>
</html>
