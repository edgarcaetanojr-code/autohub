<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
    }
  </style>
</head>

<body>

<h2 id="welcome"></h2>

<div id="content"></div>

<script>
const user = JSON.parse(localStorage.getItem('user'));
const username = localStorage.getItem('username');

if (!user || !username) {
  alert("Sem login");
  window.location.href = '/login';
}

document.getElementById('welcome').innerText =
  "Bem-vindo, " + user.nome;

async function loadDashboard() {
  try {
    const res = await fetch(`/dashboard?username=${username}`);
    const data = await res.json();

    console.log("RESPOSTA API:", data); // 👈 DEBUG

    let html = '';

    if (!data.departamentos) {
      html = "<p>Erro: departamentos não encontrados</p>";
    } else if (data.departamentos.length === 0) {
      html = "<p>Nenhum departamento vinculado</p>";
    } else {
      data.departamentos.forEach(dep => {
        html += `<h3>${dep.nome}</h3>`;

        if (dep.links) {
          dep.links.forEach(link => {
            html += `<p><a href="${link.url}" target="_blank">${link.nome}</a></p>`;
          });
        }
      });
    }

    document.getElementById('content').innerHTML = html;

  } catch (err) {
    document.getElementById('content').innerHTML =
      "<p>Erro ao carregar</p>";
  }
}

loadDashboard();
</script>

</body>
</html>
