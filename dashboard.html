<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>AutoHub Dashboard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f4f6f9;
    }

    .header {
      background: #1f2937;
      color: white;
      padding: 15px;
      font-size: 18px;
    }

    .logout {
      float: right;
      cursor: pointer;
      color: #f87171;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 8px;
      box-shadow: 0 5px 10px rgba(0,0,0,0.05);
    }

    a {
      display: block;
      color: #2563eb;
      margin-top: 5px;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

<div class="header">
  <span id="welcome"></span>
  <span class="logout" onclick="logout()">Sair</span>
</div>

<div class="container" id="content">
  <p>Carregando...</p>
</div>

<script>
// 🔐 RECUPERA USUÁRIO
const user = JSON.parse(localStorage.getItem('user'));
const username = localStorage.getItem('username');

// 🚨 BLOQUEIA SE NÃO ESTIVER LOGADO
if (!user || !username) {
  alert("Sessão expirada, faça login novamente.");
  window.location.href = '/login';
}

// 👋 EXIBE NOME
document.getElementById('welcome').innerText =
  "Bem-vindo, " + user.nome;

// 🚀 CARREGA DASHBOARD
async function loadDashboard() {
  try {
    const res = await fetch(`/dashboard?username=${username}`);

    // 🚨 SE API NÃO EXISTIR
    if (!res.ok) {
      document.getElementById('content').innerHTML =
        "<p>Erro: API /dashboard não encontrada (404)</p>";
      return;
    }

    const data = await res.json();

    console.log("Resposta da API:", data);

    let html = '';

    // 🚨 PROTEÇÃO TOTAL
    if (!data || !data.departamentos) {
      html = "<p>Erro: resposta inválida do servidor</p>";
    } 
    else if (data.departamentos.length === 0) {
      html = "<p>Nenhum departamento disponível</p>";
    } 
    else {
      data.departamentos.forEach(dep => {
        html += `<div class="card">`;
        html += `<h3>${dep.nome}</h3>`;

        if (dep.links && dep.links.length > 0) {
          dep.links.forEach(link => {
            html += `<a href="${link.url}" target="_blank">${link.nome}</a>`;
          });
        } else {
          html += `<p>Sem links</p>`;
        }

        html += `</div>`;
      });
    }

    document.getElementById('content').innerHTML = html;

  } catch (error) {
    document.getElementById('content').innerHTML =
      "<p>Erro ao carregar dashboard</p>";
  }
}

// 🔓 LOGOUT
function logout() {
  localStorage.clear();
  window.location.href = '/login';
}

// 🚀 INICIA
loadDashboard();
</script>

</body>
</html>
